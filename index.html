<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SchlauFix Dashboard</title>
    <link rel="stylesheet" media="screen" href="https://fontlibrary.org/de/face/fibel-nord" type="text/css"/>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">🦊 SchlauFix</div>
            
            <div id="score-display">
                <span class="score-label">Punkte</span>
                <div id="current-score">0</div>
            </div>

            <div class="nav-section">
                <h4>Klasse</h4>
                <select id="grade-level" class="grade-select" onchange="updateGradeLevel()">
                    <option value="1">1. Klasse</option>
                    <option value="2">2. Klasse</option>
                </select>
            </div>

            <nav class="side-nav">
                <div class="nav-section">
                    <h4>Deutsch</h4>
                    <button class="side-btn grade-1-only" onclick="showGame('silben')">📖 Silben</button>
                    <button class="side-btn grade-1-only" onclick="showGame('anlaut')">🍎 Anlaute</button>
                    <button class="side-btn grade-1-only" onclick="showGame('buchstaben-auswahl')">🔤 ABC Lernen</button>
                </div>

                <div class="nav-section">
                    <h4>Mathe</h4>
                    <button class="side-btn grade-1-only" onclick="showMathGame('mengen')">🔢 Mengen</button>
                    <button class="side-btn grade-1-only" onclick="showMathGame('vergleich')">⚖️ Vergleich</button>
                    <button class="side-btn" onclick="showMathGame('rechnen')">➕ Rechnen</button>
                    <button class="side-btn grade-1-only" onclick="showGame('zahlenmauer')">🧱 Zahlenmauer</button>
                </div>

                <div class="nav-section">
                    <h4>Einstellungen</h4>
                    <button class="side-btn" onclick="showGame('settings')">⚙️ Lernstoff</button>
                </div>
            </nav>
        </aside>

        <!-- Mobile Tab-Bar (nur auf Handy sichtbar) -->
        <div class="mobile-nav" id="mobile-nav">
            <!-- Popup-Menüs (klappen nach oben auf) -->
            <div class="mobile-popup" id="popup-deutsch">
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNav('silben')">📖 Silben</button>
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNav('anlaut')">🍎 Anlaute</button>
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNav('buchstaben-auswahl')">🔤 ABC Lernen</button>
            </div>
            <div class="mobile-popup" id="popup-mathe">
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNavMath('mengen')">🔢 Mengen</button>
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNavMath('vergleich')">⚖️ Vergleich</button>
                <button class="mobile-popup-btn" onclick="mobileNavMath('rechnen')">➕ Rechnen</button>
                <button class="mobile-popup-btn grade-1-only" onclick="mobileNav('zahlenmauer')">🧱 Zahlenmauer</button>
            </div>

            <!-- Score-Anzeige in der Mitte -->
            <div class="mobile-score">
                <span id="mobile-score-val">0</span>
                <span class="mobile-score-label">Pkt</span>
            </div>

            <!-- Tab-Buttons -->
            <div class="mobile-tabs">
                <button class="mobile-tab" id="tab-deutsch" onclick="toggleMobilePopup('deutsch')">
                    <span class="mobile-tab-icon">🔤</span>
                    <span class="mobile-tab-label">Deutsch</span>
                </button>
                <button class="mobile-tab mobile-tab-score" onclick="showGame('settings')">
                    <span class="mobile-tab-icon">⚙️</span>
                    <span class="mobile-tab-label">Einst.</span>
                </button>
                <button class="mobile-tab" id="tab-mathe" onclick="toggleMobilePopup('mathe')">
                    <span class="mobile-tab-icon">🔢</span>
                    <span class="mobile-tab-label">Mathe</span>
                </button>
            </div>
        </div>

        <main class="main-content">
            <div id="game-silben" class="game-screen">
                <div id="wordContainer" class="word-display">Wähle Buchstaben!</div>
                <div class="controls">
                    <button class="audio-btn" onclick="speakCurrentWord()">🔊</button>
                    <button class="main-btn" onclick="renderRandomWord()">Weiter</button>
                </div>
            </div>

            <div id="game-anlaut" class="game-screen" style="display:none;">
                <div id="anlautWord" class="word-display"></div>
                <div id="anlaut-keyboard" class="alphabet"></div>
            </div>

            <div id="game-rechnen" class="game-screen" style="display:none;">
                <div id="math-display" class="word-display"></div>
                <div id="math-options" class="alphabet"></div>
            </div>

            <div id="game-zahlenmauer" class="game-screen" style="display:none;">
                <div id="zahlenmauer-container"></div>
                <div class="controls" style="margin-top:20px;">
                    <button class="main-btn" onclick="checkZahlenmauer()">✔ Prüfen</button>
                    <button class="main-btn" style="background:#78909C; box-shadow:0 5px 0 #546E7A;" onclick="generateZahlenmauer()">Neu</button>
                </div>
                <div id="zahlenmauer-feedback"></div>
            </div>

            <!-- Buchstaben-Auswahl -->
            <div id="game-buchstaben-auswahl" class="game-screen" style="display:none;">
                <h3 style="text-align:center;margin-top:0;">🔤 Welchen Buchstaben möchtest du lernen?</h3>
                <div id="buchstaben-auswahl-grid" class="bl-auswahl-grid"></div>
            </div>

            <!-- Buchstaben-Lernmodul (wird dynamisch befüllt) -->
            <div id="game-buchstaben" class="game-screen" style="display:none;"></div>

            <div id="game-settings" class="game-screen" style="display:none;">
                <h3>Gelernte Buchstaben</h3>
                <div id="alphabet-selection-grid" class="alphabet-grid"></div>
                
                <h3>Zahlenraum</h3>
                <div class="range-selection">
                    <button class="range-btn" onclick="setMathRange(10)">bis 10</button>
                    <button class="range-btn" onclick="setMathRange(20)">bis 20</button>
                    <button class="range-btn" onclick="setMathRange(100)">bis 100</button>
                </div>
            </div>
        </main>
    </div>
    <!-- Feedback Toast -->
    <div id="feedback-toast" class="feedback-toast"></div>

    <!-- Meilenstein-Overlay -->
    <div id="milestone-overlay" class="milestone-overlay" style="display:none;">
        <canvas id="firework-canvas"></canvas>
        <div id="milestone-content"></div>
    </div>

    <script src="script.js"></script>
    <script src="buchstaben.js"></script>
</body>
</html>
